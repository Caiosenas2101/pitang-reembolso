info:
  name: Atualizar Categoria Admin
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:3333/categories/{{categoryId}}
  auth:
    type: bearer
    token: "{{token}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "ativo": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
