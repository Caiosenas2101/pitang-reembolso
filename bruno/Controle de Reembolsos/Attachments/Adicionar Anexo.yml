info:
  name: Adicionar Anexo
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3333/reimbursements/{{reimbursementId}}/attachments
  auth:
    type: bearer
    token: "{{token}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "nomeArquivo": "comprovante-corrida.pdf",
        "urlArquivo": "https://exemplo.com/comprovante-corrida.pdf",
        "tipoArquivo": "PDF"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
