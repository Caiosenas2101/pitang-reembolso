info:
  name: Login Colaborador
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3333/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "colaborador@teste.com",
        "senha": "123456"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("token", res.body.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
