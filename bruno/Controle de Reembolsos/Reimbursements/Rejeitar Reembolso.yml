info:
  name: Rejeitar Reembolso
  type: http
  seq: 9

http:
  method: POST
  url: http://localhost:3333/reimbursements/{{reimbursementId}}/reject
  auth:
    type: bearer
    token: "{{token}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "justificativaRejeicao": "Comprovante insuficiente para aprovacao."
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
